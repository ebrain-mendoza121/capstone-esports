[flake8]
max-line-length = 130
extend-ignore =
    # E221: multiple spaces before operator (column alignment in service files)
    E221,
    # E272: multiple spaces before keyword (alignment)
    E272,
    # W291/W293: trailing / blank-line whitespace in pre-existing source files
    W291,
    W293,
    # W391: blank line at end of file
    W391,
    # W503/W504: line break before/after binary operator — style preference
    W503,
    W504,
    # E303: too many blank lines (present in large service files)
    E303,
    # F401: imported but unused — typing.Optional used in type comments in app/
    F401,
    # F811: redefinition of name from earlier import (app/ test fixtures)
    F811,
    # F841: local variable assigned but never used (intermediate debug var)
    F841,
    # E302: expected 2 blank lines (pre-existing style in crud files)
    E302,
    # E402: module level import not at top (conditional imports in ai_service)
    E402,
per-file-ignores =
    # conftest sets env vars before imports by design
    tests/conftest.py: E402
exclude =
    __pycache__,
    .venv,
    migrations,
    .git
