name: Backend CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'backend/**'

jobs:
  # -----------------------------------------------------------------------
  # Job 1: Unit Tests
  # Runs pure function tests with NO external dependencies.
  # These always run — no secrets or database required.
  # -----------------------------------------------------------------------
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run unit tests
        working-directory: backend
        env:
          DATABASE_URL: sqlite:///./test_ci.db
          RIOT_API_KEY: CI_TEST_KEY_NOT_USED
        run: |
          pytest tests/unit/ -v \
            --tb=short \
            -m unit \
            --cov=app/services/derived_metrics_calculator \
            --cov=app/services/feature_extractor \
            --cov=app/services/metrics_service \
            --cov-report=term-missing \
            --cov-fail-under=80

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-coverage
          path: backend/.coverage

  # -----------------------------------------------------------------------
  # Job 2: Integration Tests
  # Uses FastAPI TestClient + SQLite in-memory.
  # Runs on push to main only (requires no external services).
  # -----------------------------------------------------------------------
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov httpx

      - name: Run integration tests
        working-directory: backend
        env:
          DATABASE_URL: sqlite:///./test_ci_integration.db
          RIOT_API_KEY: CI_TEST_KEY_NOT_USED
        run: |
          pytest tests/integration/ -v \
            --tb=short \
            -m integration

      - name: Cleanup test database
        working-directory: backend
        if: always()
        run: rm -f test_ci_integration.db test_ci.db test_esports.db

  # -----------------------------------------------------------------------
  # Job 3: Lint Check
  # Verifies PEP8 compliance (required by capstone engineering standards).
  # -----------------------------------------------------------------------
  lint:
    name: PEP8 Lint (flake8)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        working-directory: backend
        run: |
          flake8 app/ tests/ \
            --max-line-length=100 \
            --exclude=__pycache__,.venv,migrations \
            --count \
            --statistics
